<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - PEACEKOMPUTER</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>

    <header>
      <h1><img src="logo.jpg" alt="Logo PEACEKOMPUTER" />PEACEKOMPUTER</h1>
      <nav>
        <a href="index.html">Beranda</a>
        <a href="index.html#produk">Produk</a>
        <a href="index.html#kontak">Kontak</a>
      </nav>
    </header>

    <main>
      <section class="login-box">
        <h2>Login</h2>

        <form class="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Masukkan email" />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="Masukkan password" />
          </div>

          <button type="submit">Masuk</button>
        </form>

        <p class="daftar-link">
          Belum punya akun?
          <a href="https://wa.me/6285810828006">Hubungi kami via WhatsApp</a>
        </p>
      </section>
    </main>

  </body>
</html>
